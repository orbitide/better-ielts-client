<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Floor plan of the community centre">
  <rect x="0" y="0" width="400" height="300" fill="#f8f8f8" stroke="#ccc" stroke-width="2"/>

  <!-- Car Park -->
  <rect x="10" y="10" width="100" height="110" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="60" y="68" font-size="13" text-anchor="middle" fill="#374151" font-family="sans-serif">Car Park</text>

  <!-- Reception -->
  <rect x="130" y="10" width="140" height="90" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="200" y="58" font-size="13" text-anchor="middle" fill="#374151" font-family="sans-serif">Reception</text>

  <!-- Reading Room -->
  <rect x="290" y="10" width="100" height="130" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="340" y="72" font-size="13" text-anchor="middle" fill="#374151" font-family="sans-serif">Reading</text>
  <text x="340" y="90" font-size="13" text-anchor="middle" fill="#374151" font-family="sans-serif">Room</text>

  <!-- Cafe -->
  <rect x="10" y="140" width="160" height="140" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="90" y="213" font-size="13" text-anchor="middle" fill="#374151" font-family="sans-serif">Cafe</text>

  <!-- Garden -->
  <rect x="190" y="160" width="200" height="120" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="290" y="223" font-size="13" text-anchor="middle" fill="#374151" font-family="sans-serif">Garden</text>

  <!-- Entrance -->
  <rect x="170" y="282" width="60" height="14" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="200" y="292" font-size="10" text-anchor="middle" fill="#374151" font-family="sans-serif">Entrance</text>
</svg>
